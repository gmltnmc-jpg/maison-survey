<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maison de Balance · 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#F5F0E6;
  --paper:#FDFBF7;
  --white:#FFFFFF;
  --ink:#1A1714;
  --ink-soft:#4A4540;
  --grey:#8A8278;
  --line:#DDD5C4;
  --gold:#B09A6A;
  --gold-soft:#D4C49E;
  --error:#9C4A35;
  --serif:'Noto Serif KR',serif;
  --sans:'Noto Sans KR',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{height:100%}
body{background:var(--cream);color:var(--ink);font-family:var(--sans);font-weight:300;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100%}
button,input,select,textarea{font-family:var(--sans)}

/* ── 로그인 화면 ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:var(--paper);padding:56px 48px;width:100%;max-width:400px;border:1px solid var(--line)}
.login-mark{font-size:10px;letter-spacing:.5em;color:var(--gold);text-transform:uppercase;margin-bottom:20px}
.login-title{font-family:var(--serif);font-size:22px;font-weight:500;letter-spacing:.06em;margin-bottom:32px}
.login-box label{display:block;font-size:12px;letter-spacing:.12em;color:var(--grey);margin-bottom:8px}
.login-box input[type=password]{width:100%;border:none;border-bottom:1px solid var(--line);background:transparent;padding:10px 0;font-size:15px;color:var(--ink);outline:none;transition:border-color .2s}
.login-box input[type=password]:focus{border-bottom-color:var(--gold)}
.login-btn{margin-top:28px;width:100%;background:var(--ink);color:var(--cream);border:none;padding:14px;font-size:12px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:background .25s}
.login-btn:hover{background:var(--gold)}
.login-err{margin-top:14px;font-size:12.5px;color:var(--error);display:none}

/* ── 앱 레이아웃 ── */
#app{display:none;min-height:100vh}
.topbar{background:var(--paper);border-bottom:1px solid var(--line);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-brand{font-size:10px;letter-spacing:.42em;color:var(--gold);text-transform:uppercase}
.topbar-right{display:flex;align-items:center;gap:20px}
.topbar-count{font-size:12px;color:var(--grey)}
.logout-btn{font-size:11px;letter-spacing:.14em;color:var(--ink-soft);background:none;border:1px solid var(--line);padding:6px 16px;cursor:pointer;transition:border-color .2s}
.logout-btn:hover{border-color:var(--grey)}

.main-layout{display:grid;grid-template-columns:1fr 480px;min-height:calc(100vh - 56px)}

/* ── 목록 패널 ── */
.list-panel{border-right:1px solid var(--line);background:var(--paper)}
.list-header{padding:24px 28px 16px;border-bottom:1px solid var(--line)}
.list-header h2{font-family:var(--serif);font-size:16px;font-weight:500;letter-spacing:.06em}
.list-filter{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{font-size:11px;letter-spacing:.1em;padding:5px 14px;border:1px solid var(--line);background:transparent;color:var(--ink-soft);cursor:pointer;transition:all .2s}
.filter-btn.active,.filter-btn:hover{background:var(--ink);color:var(--cream);border-color:var(--ink)}

.list-body{overflow-y:auto;max-height:calc(100vh - 160px)}
.list-item{padding:18px 28px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:16px}
.list-item:hover{background:var(--cream)}
.list-item.selected{background:var(--cream);border-left:2px solid var(--gold)}
.list-item-info{flex:1;min-width:0}
.list-name{font-size:14.5px;font-weight:500;letter-spacing:.02em}
.list-meta{font-size:12px;color:var(--grey);margin-top:3px}
.list-date{font-size:11.5px;color:var(--grey);white-space:nowrap}
.badge{font-size:10.5px;letter-spacing:.08em;padding:3px 10px;border:1px solid currentColor;white-space:nowrap}
.badge-신규{color:var(--gold)}
.badge-확인완료{color:#5C8A6A}
.badge-상담예정{color:#5A6E8A}
.badge-상담완료{color:var(--grey)}
.badge-보류{color:var(--error)}

.list-empty{padding:60px 28px;text-align:center;color:var(--grey);font-size:13.5px}

/* ── 상세 패널 ── */
.detail-panel{background:var(--white);overflow-y:auto;max-height:calc(100vh - 56px)}
.detail-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--grey);font-size:13px;letter-spacing:.08em}

.detail-head{padding:28px 32px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--white);z-index:10}
.detail-name{font-family:var(--serif);font-size:22px;font-weight:500;letter-spacing:.04em}
.detail-sub{font-size:13px;color:var(--grey);margin-top:6px;display:flex;gap:20px;flex-wrap:wrap}
.detail-sub span{display:flex;align-items:center;gap:5px}

.detail-ctrl{padding:16px 32px;border-bottom:1px solid var(--line);display:flex;gap:12px;align-items:flex-end;background:var(--cream)}
.ctrl-group{flex:1}
.ctrl-group label{display:block;font-size:11px;letter-spacing:.14em;color:var(--grey);margin-bottom:6px;text-transform:uppercase}
select.status-sel{width:100%;border:1px solid var(--line);background:var(--paper);padding:9px 12px;font-size:13px;color:var(--ink);outline:none;cursor:pointer;-webkit-appearance:none;border-radius:0}
select.status-sel:focus{border-color:var(--gold)}
.save-btn{background:var(--ink);color:var(--cream);border:none;padding:9px 24px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;transition:background .25s;white-space:nowrap;height:38px}
.save-btn:hover{background:var(--gold)}
.save-btn:disabled{opacity:.45;cursor:wait}

textarea.memo-area{width:100%;border:1px solid var(--line);background:var(--paper);padding:10px 12px;font-size:13px;color:var(--ink);resize:vertical;min-height:72px;outline:none;border-radius:0;line-height:1.7}
textarea.memo-area:focus{border-color:var(--gold)}

.save-msg{font-size:12px;color:#5C8A6A;margin-top:6px;min-height:18px}

/* ── 설문 답변 렌더링 ── */
.detail-answers{padding:24px 32px 48px}
.ans-section{margin-bottom:32px}
.ans-sec-label{font-size:10px;letter-spacing:.38em;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
.ans-sec-title{font-family:var(--serif);font-size:15px;font-weight:500;letter-spacing:.06em;padding-bottom:10px;border-bottom:1px solid var(--gold-soft);margin-bottom:16px}
.ans-item{padding:12px 0;border-bottom:1px solid var(--line);display:grid;grid-template-columns:160px 1fr;gap:16px}
.ans-item:last-child{border-bottom:none}
.ans-label{font-size:12px;color:var(--grey);letter-spacing:.02em;padding-top:2px}
.ans-val{font-size:13.5px;color:var(--ink);line-height:1.7}
.ans-val.empty{color:var(--grey);font-style:italic}
.tag-wrap{display:flex;flex-wrap:wrap;gap:6px}
.tag{font-size:11.5px;padding:3px 10px;background:var(--cream);border:1px solid var(--line);color:var(--ink-soft)}
.ans-grid-table{font-size:13px;border-collapse:collapse;width:100%}
.ans-grid-table th{font-size:11px;letter-spacing:.1em;color:var(--grey);padding:4px 12px 8px;text-align:center;font-weight:400}
.ans-grid-table th:first-child{text-align:left}
.ans-grid-table td{padding:8px 12px;border-top:1px solid var(--line);text-align:center}
.ans-grid-table td:first-child{text-align:left}

/* ── 로딩 ── */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-row{padding:40px;text-align:center;color:var(--grey);font-size:13px}

@media(max-width:900px){
  .main-layout{grid-template-columns:1fr}
  .detail-panel{max-height:none;border-top:1px solid var(--line)}
}
</style>
</head>
<body>

<!-- ── 로그인 화면 ── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-mark">Maison de Balance</div>
    <h1 class="login-title">관리자 로그인</h1>
    <label>비밀번호</label>
    <input type="password" id="pw-input" placeholder="" autocomplete="current-password">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <p class="login-err" id="login-err">비밀번호가 올바르지 않습니다.</p>
  </div>
</div>

<!-- ── 메인 앱 ── -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">Maison de Balance · Admin</div>
    <div class="topbar-right">
      <span class="topbar-count" id="top-count"></span>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </div>

  <div class="main-layout">
    <!-- 목록 -->
    <div class="list-panel">
      <div class="list-header">
        <h2>초진 설문 응답</h2>
        <div class="list-filter">
          <button class="filter-btn active" data-status="전체" onclick="setFilter(this)">전체</button>
          <button class="filter-btn" data-status="신규" onclick="setFilter(this)">신규</button>
          <button class="filter-btn" data-status="확인 완료" onclick="setFilter(this)">확인 완료</button>
          <button class="filter-btn" data-status="상담 예정" onclick="setFilter(this)">상담 예정</button>
          <button class="filter-btn" data-status="상담 완료" onclick="setFilter(this)">상담 완료</button>
          <button class="filter-btn" data-status="보류" onclick="setFilter(this)">보류</button>
        </div>
      </div>
      <div class="list-body" id="list-body">
        <div class="loading-row"><span class="spinner"></span></div>
      </div>
    </div>

    <!-- 상세 -->
    <div class="detail-panel" id="detail-panel">
      <div class="detail-empty" id="detail-empty">응답을 선택해주세요</div>
      <div id="detail-content" style="display:none"></div>
    </div>
  </div>
</div>

<script>
/* ────────────────────────────────────────────
   설정
──────────────────────────────────────────── */
const SUPABASE_URL  = "https://easvjmqsivolzcrqfjbx.supabase.co";
const ANON_KEY      = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhc3ZqbXFzaXZvbHpjcnFmamJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5ODQ5NzAsImV4cCI6MjA5NjU2MDk3MH0.F6B8RevsBurRlniu3Z7leckbXL4q5WUBMBMLmyJ6YBY";
const ADMIN_PW      = "maison2024"; // ← 변경 가능
const TABLE         = "intake_responses";

/* ────────────────────────────────────────────
   설문 구조 (answers jsonb 렌더링용)
──────────────────────────────────────────── */
const SECTIONS = [
 {no:"01",title:"기본 정보",items:[
  {id:"name",l:"성함"},{id:"rrn",l:"주민등록번호"},{id:"phone",l:"연락처"},

 ]},

 {no:"04",title:"다이어트 이력",items:[
  {id:"diet_tried",l:"다이어트 경험"},{id:"diet_methods",l:"시도 방법",arr:1},
  {id:"diet_exp",l:"잘 됐던/어려웠던 점"},{id:"weight_now",l:"현재 체중(kg)"},
  {id:"height",l:"키(cm)"},{id:"weight_goal",l:"목표 체중(kg)"},

 {no:"06",title:"식사 리듬",items:[

  {id:"meal_dinner",l:"저녁 식사 시간"},{id:"meal_night",l:"야식 시간"},

  {id:"hungry_time",l:"가장 고픈 시간대"},{id:"missed_meal",l:"끼니 놓쳤을 때"},
  {id:"eating_speed",l:"식사 속도"},{id:"appetite",l:"식욕 강도"},
  {id:"alcohol_freq",l:"음주 빈도"},{id:"alcohol_type",l:"주요 주종"},
  {id:"alcohol_amount",l:"1회 음주량"},{id:"alcohol_food",l:"음주 시 식사"},
  {id:"coffee_amount",l:"하루 커피(잔)"},{id:"coffee_time",l:"커피 마시는 시간"},
  {id:"caffeine",l:"카페인 반응"}
 ]},
 {no:"07",title:"수분 & 미네랄 리듬",items:[
  {id:"water_habit",l:"수분 섭취 방식",arr:1},{id:"urine",l:"소변 색깔"}
 ]},
 {no:"08",title:"몸의 신호",items:[
  {id:"temp_energy",l:"체온·에너지 상태",arr:1},{id:"sweat",l:"땀 패턴"},
  {id:"edema",l:"부종"},{id:"edema_part",l:"붓는 부위",arr:1},
  {id:"digestion",l:"소화 상태"},{id:"digestion_sym",l:"소화 증상",arr:1},
  {id:"bowel_freq",l:"배변 빈도"},{id:"stool",l:"변 상태"}
 ]},
 {no:"09",title:"여성 건강 리듬",items:[{id:"cycle",l:"생리 주기",arr:1}]},
 {no:"10",title:"건강 이력",items:[
  {id:"diseases",l:"진단받은 질환",arr:1},{id:"surgery",l:"수술 이력"},
  {id:"meds",l:"복용 중인 약/보조제",arr:1},{id:"allergy",l:"음식 알레르기"},
  {id:"allergy_detail",l:"알레르기 상세"},{id:"job",l:"직업·생활 패턴"},
  {id:"exercise",l:"규칙적 운동"},{id:"exercise_detail",l:"운동 상세"}
 ]},
 {no:"11",title:"가족력",items:[
  {id:"family",l:"가족 대사 질환"},{id:"family_detail",l:"가족력 상세"}
 ]},
 {no:"12",title:"마지막 질문",items:[{id:"final_note",l:"전하고 싶은 말"}]}
];

/* ────────────────────────────────────────────
   상태
──────────────────────────────────────────── */
let allData     = [];
let filtered    = [];
let curFilter   = "전체";
let selectedId  = null;

/* ────────────────────────────────────────────
   로그인
──────────────────────────────────────────── */
function doLogin(){
  const val = document.getElementById("pw-input").value;
  if(val === ADMIN_PW){
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").style.display = "block";
    loadList();
  } else {
    document.getElementById("login-err").style.display = "block";
    document.getElementById("pw-input").value = "";
  }
}
document.getElementById("pw-input").addEventListener("keydown", e=>{
  if(e.key==="Enter") doLogin();
});

function doLogout(){
  document.getElementById("app").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("pw-input").value = "";
  allData=[]; filtered=[]; selectedId=null;
}

/* ────────────────────────────────────────────
   Supabase 헬퍼
──────────────────────────────────────────── */
async function sbFetch(path, opts={}){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...opts,
    headers:{
      "apikey":ANON_KEY,
      "Authorization":`Bearer ${ANON_KEY}`,
      "Content-Type":"application/json",
      "Prefer": opts.method==="PATCH" ? "return=minimal" : "return=representation",
      ...(opts.headers||{})
    }
  });
  if(!res.ok){
    const t = await res.text();
    throw new Error(`${res.status}: ${t}`);
  }
  if(opts.method==="PATCH") return null;
  return res.json();
}

/* ────────────────────────────────────────────
   목록 로드
──────────────────────────────────────────── */
async function loadList(){
  document.getElementById("list-body").innerHTML = '<div class="loading-row"><span class="spinner"></span></div>';
  try{
    allData = await sbFetch(`${TABLE}?select=id,created_at,name,phone,status&order=created_at.desc`);
    applyFilter();
  }catch(e){
    document.getElementById("list-body").innerHTML = `<div class="loading-row" style="color:var(--error)">로드 실패: ${e.message}</div>`;
  }
}

function applyFilter(){
  filtered = curFilter==="전체" ? allData : allData.filter(r=>r.status===curFilter);
  document.getElementById("top-count").textContent = `총 ${filtered.length}건`;
  renderList();
}

function setFilter(btn){
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  curFilter = btn.dataset.status;
  applyFilter();
}

function renderList(){
  const el = document.getElementById("list-body");
  if(!filtered.length){
    el.innerHTML = '<div class="list-empty">응답이 없습니다.</div>';
    return;
  }
  el.innerHTML = filtered.map(r=>{
    const dt = new Date(r.created_at);
    const dateStr = `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,"0")}.${String(dt.getDate()).padStart(2,"0")}`;
    const timeStr = `${String(dt.getHours()).padStart(2,"0")}:${String(dt.getMinutes()).padStart(2,"0")}`;
    const badgeClass = "badge-"+(r.status||"신규").replace(/ /g,"");
    return `<div class="list-item${r.id===selectedId?" selected":""}" onclick="selectRow('${r.id}')">
      <div class="list-item-info">
        <div class="list-name">${esc(r.name||"(이름 없음)")}</div>
        <div class="list-meta">${esc(r.phone||"")}</div>
      </div>
      <div style="text-align:right">
        <div class="badge ${badgeClass}">${esc(r.status||"신규")}</div>
        <div class="list-date" style="margin-top:5px">${dateStr}<br>${timeStr}</div>
      </div>
    </div>`;
  }).join("");
}

/* ────────────────────────────────────────────
   상세 로드
──────────────────────────────────────────── */
async function selectRow(id){
  selectedId = id;
  renderList();
  document.getElementById("detail-empty").style.display = "none";
  const dc = document.getElementById("detail-content");
  dc.style.display = "block";
  dc.innerHTML = '<div class="loading-row"><span class="spinner"></span></div>';
  try{
    const rows = await sbFetch(`${TABLE}?id=eq.${id}&select=*`);
    const r = rows[0];
    renderDetail(r);
  }catch(e){
    dc.innerHTML = `<div class="loading-row" style="color:var(--error)">로드 실패: ${e.message}</div>`;
  }
}

function renderDetail(r){
  const dt = new Date(r.created_at);
  const dateStr = `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,"0")}.${String(dt.getDate()).padStart(2,"0")} ${String(dt.getHours()).padStart(2,"0")}:${String(dt.getMinutes()).padStart(2,"0")}`;
  const a = r.answers || {};

  const statusOpts = ["신규","확인 완료","상담 예정","상담 완료","보류"]
    .map(s=>`<option value="${s}"${r.status===s?" selected":""}>${s}</option>`).join("");

  const ansHtml = SECTIONS.map(sec=>{
    const items = sec.items.map(it=>{
      const val = a[it.id];
      let display = "";
      if(it.grid){
        if(val && typeof val==="object"){
          display = `<table class="ans-grid-table"><thead><tr><th></th><th>규칙적</th><th>불규칙</th></tr></thead><tbody>`+
            Object.entries(val).map(([row,col])=>`<tr><td>${esc(row)}</td><td>${col==="규칙적"?"✓":""}</td><td>${col==="불규칙"?"✓":""}</td></tr>`).join("")+
            `</tbody></table>`;
        } else display = `<span class="empty">미입력</span>`;
      } else if(it.arr && Array.isArray(val)){
        display = val.length ? `<div class="tag-wrap">${val.map(v=>`<span class="tag">${esc(v)}</span>`).join("")}</div>` : `<span class="empty">미선택</span>`;
      } else {
        display = val ? `<span>${esc(String(val))}</span>` : `<span class="empty">미입력</span>`;
      }
      return `<div class="ans-item"><div class="ans-label">${esc(it.l)}</div><div class="ans-val">${display}</div></div>`;
    }).join("");
    return `<div class="ans-section">
      <div class="ans-sec-label">No.${sec.no}</div>
      <div class="ans-sec-title">${esc(sec.title)}</div>
      ${items}
    </div>`;
  }).join("");

  document.getElementById("detail-content").innerHTML = `
    <div class="detail-head">
      <div class="detail-name">${esc(r.name||"(이름 없음)")}</div>
      <div class="detail-sub">
        <span>📱 ${esc(r.phone||"연락처 없음")}</span>
        <span>🕐 ${dateStr}</span>
      </div>
    </div>

    <div class="detail-ctrl">
      <div class="ctrl-group">
        <label>상담 상태</label>
        <select class="status-sel" id="d-status">${statusOpts}</select>
      </div>
      <div class="ctrl-group" style="flex:2">
        <label>관리자 메모</label>
        <textarea class="memo-area" id="d-memo" placeholder="내부 메모를 입력하세요.">${esc(r.admin_memo||"")}</textarea>
      </div>
      <div>
        <button class="save-btn" id="save-btn" onclick="saveDetail('${r.id}')">저장</button>
        <div class="save-msg" id="save-msg"></div>
      </div>
    </div>

    <div class="detail-answers">${ansHtml}</div>`;
}

/* ────────────────────────────────────────────
   저장
──────────────────────────────────────────── */
async function saveDetail(id){
  const btn  = document.getElementById("save-btn");
  const msg  = document.getElementById("save-msg");
  const status = document.getElementById("d-status").value;
  const memo   = document.getElementById("d-memo").value;
  btn.disabled = true; btn.textContent = "저장 중…"; msg.textContent = "";
  try{
    await sbFetch(`${TABLE}?id=eq.${id}`, {
      method:"PATCH",
      body: JSON.stringify({status, admin_memo: memo})
    });
    // 목록 캐시 업데이트
    const idx = allData.findIndex(r=>r.id===id);
    if(idx>-1) allData[idx].status = status;
    applyFilter();
    msg.style.color="#5C8A6A"; msg.textContent = "저장되었습니다.";
    setTimeout(()=>msg.textContent="", 3000);
  }catch(e){
    msg.style.color="var(--error)"; msg.textContent = "저장 실패: "+e.message;
  }finally{
    btn.disabled = false; btn.textContent = "저장";
  }
}

/* ────────────────────────────────────────────
   유틸
──────────────────────────────────────────── */
function esc(s){
  return String(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
}
</script>
</body>
</html>
